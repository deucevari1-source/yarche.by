<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="AI-сотрудник — оранжевая иконка чата на тёмном фоне">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="circle" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FFE500"/>
      <stop offset="55%" stop-color="#FF8A00"/>
      <stop offset="100%" stop-color="#E05500"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8A00" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#FF8A00" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF8A00" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="18" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.55"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <!-- Soft outer glow behind the circle -->
  <circle cx="800" cy="500" r="500" fill="url(#glow)"/>

  <!-- Main orange circle with subtle shadow -->
  <g filter="url(#softShadow)">
    <circle cx="800" cy="500" r="240" fill="url(#circle)"/>
  </g>

  <!-- Inner highlight ring (matches the OS-style icon vibe) -->
  <circle cx="800" cy="500" r="240" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>

  <!-- White speech-bubble icon -->
  <g transform="translate(800 500)">
    <path
      d="M -120 -55
         a 36 36 0 0 1 36 -36
         h 168
         a 36 36 0 0 1 36 36
         v 86
         a 36 36 0 0 1 -36 36
         h -100
         l -70 60
         v -60
         h 2
         a 36 36 0 0 1 -36 -36
         Z"
      fill="#ffffff"
      stroke="#ffffff"
      stroke-opacity="0.0"
      stroke-linejoin="round"
    />
    <!-- Three dots inside the bubble -->
    <circle cx="-50" cy="-12" r="12" fill="#E05500"/>
    <circle cx="0"   cy="-12" r="12" fill="#E05500"/>
    <circle cx="50"  cy="-12" r="12" fill="#E05500"/>
  </g>
</svg>
