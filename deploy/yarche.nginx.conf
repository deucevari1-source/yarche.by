# /etc/nginx/sites-available/yarche.by
# Symlink to sites-enabled/ then `nginx -t && systemctl reload nginx`.

# Redirect bare http → https with www → apex (or vice versa, adjust to taste).
server {
    listen 80;
    listen [::]:80;
    server_name yarche.by www.yarche.by;

    # Let's Encrypt ACME challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://yarche.by$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.yarche.by;

    ssl_certificate     /etc/letsencrypt/live/yarche.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yarche.by/privkey.pem;

    return 301 https://yarche.by$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yarche.by;

    ssl_certificate     /etc/letsencrypt/live/yarche.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yarche.by/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # Compression — gzip is built-in; brotli requires libnginx-mod-http-brotli
    # (Ubuntu/Debian: `apt install libnginx-mod-http-brotli`). Brotli ships ~15-20%
    # smaller than gzip for text content. Both can be enabled simultaneously —
    # nginx serves brotli to clients that accept it, falls back to gzip otherwise.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript application/json
        application/javascript application/xml+rss application/atom+xml
        image/svg+xml font/woff2;

    # Brotli — uncomment after `apt install libnginx-mod-http-brotli`.
    # brotli on;
    # brotli_comp_level 5;
    # brotli_min_length 1024;
    # brotli_types
    #     text/plain text/css text/xml text/javascript application/json
    #     application/javascript application/xml+rss application/atom+xml
    #     image/svg+xml font/woff2;

    client_max_body_size 10m;

    # Aggressively cache content-hashed Next bundles (filenames include hashes).
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Bundles are immutable — cache for a year. nginx adds the header on the
        # response from upstream; browser sees public, immutable, 1y.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Static assets in /public (fonts, images, etc.) — long cache.
    location ~* \.(woff2|woff|ttf|otf|jpg|jpeg|png|webp|gif|svg|ico|mp4)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # Everything else — proxy to Next.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Block hidden files just in case.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
